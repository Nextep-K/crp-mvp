# Streamlit Cloud > App settings > Secrets 에 아래 값을 입력하세요.
# 이 파일은 예시이며, secrets.toml 원본을 GitHub에 올리지 마세요.

ANTHROPIC_API_KEY = "sk-ant-..."
PROF_PASSWORD = "change-this-prof-password"
# 선택 사항: 운영 중 Claude 모델을 교체할 때만 지정합니다.
# 비워두면 코드의 기본값 claude-sonnet-4-6을 사용합니다.
ANTHROPIC_MODEL = "claude-sonnet-4-6"
